<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Health Monitor</title>
  <link rel="stylesheet" href="App.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }

    .login-page {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #e0fff5 0%, #f0f4f8 55%, #ede9fe 100%);
      padding: 40px 20px;
      position: relative; overflow: hidden;
    }
    .login-page::before {
      content:''; position:absolute; top:-100px; right:-100px;
      width:350px; height:350px;
      background:radial-gradient(circle,rgba(0,201,141,0.12),transparent 70%);
      border-radius:50%;
    }
    .login-page::after {
      content:''; position:absolute; bottom:-80px; left:-80px;
      width:280px; height:280px;
      background:radial-gradient(circle,rgba(108,99,255,0.08),transparent 70%);
      border-radius:50%;
    }

    .login-card {
      background: #fff;
      border-radius: 28px;
      border: 1.5px solid #e2e8f0;
      padding: 48px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      position: relative; z-index: 1;
      animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform:translateY(24px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .login-logo { font-size: 48px; display: block; text-align: center; margin-bottom: 12px; }

    .login-card h2 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900; font-size: 28px;
      color: #1a1f36; text-align: center; margin-bottom: 6px;
    }

    .login-card .subtitle {
      font-size: 14px; color: #94a3b8;
      text-align: center; margin-bottom: 32px;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 13px;
      color: #374151; margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid #e2e8f0; border-radius: 12px;
      font-size: 15px; color: #1a1f36;
      background: #fafafa; outline: none;
      transition: all 0.2s; box-sizing: border-box;
    }
    .form-group input:focus {
      border-color: #00c98d; background: #fff;
      box-shadow: 0 0 0 3px rgba(0,201,141,0.12);
    }

    .login-btn {
      width: 100%; padding: 14px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, #00c98d, #00a374); color: #fff;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px;
      cursor: pointer; transition: all 0.25s; margin-top: 8px;
      box-shadow: 0 6px 20px rgba(0,201,141,0.3);
    }
    .login-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,201,141,0.4); }
    .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .msg {
      margin-top: 14px; padding: 12px 16px;
      border-radius: 10px; font-weight: 700;
      font-size: 14px; text-align: center; display: none;
    }
    .msg.error   { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
    .msg.success { background: #e0fff5; color: #00a374; border: 1px solid #00c98d; }

    /* Greeting overlay */
    .greeting-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease both;
    }
    .greeting-overlay.show { display: flex; }

    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .greeting-box {
      background: #fff; border-radius: 28px;
      padding: 48px 40px; text-align: center;
      max-width: 380px; width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.15);
      animation: popIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
    }

    @keyframes popIn {
      from { opacity:0; transform:scale(0.85) translateY(20px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }

    .greeting-emoji { font-size: 64px; display: block; margin-bottom: 16px; animation: wave 1s ease-in-out 0.3s both; }
    @keyframes wave {
      0%   { transform: rotate(0deg); }
      20%  { transform: rotate(20deg); }
      40%  { transform: rotate(-10deg); }
      60%  { transform: rotate(15deg); }
      80%  { transform: rotate(-5deg); }
      100% { transform: rotate(0deg); }
    }

    .greeting-box h2 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900; font-size: 26px;
      color: #1a1f36; margin-bottom: 8px;
    }
    .greeting-box p { font-size: 15px; color: #64748b; margin-bottom: 24px; line-height: 1.6; }

    .greeting-time-badge {
      display: inline-block;
      background: var(--bg, #e0fff5);
      color: var(--tc, #00a374);
      border-radius: 50px; padding: 6px 18px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 14px;
      margin-bottom: 24px;
    }

    .go-btn {
      width: 100%; padding: 13px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, #00c98d, #00a374); color: #fff;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
      cursor: pointer; transition: all 0.25s;
      box-shadow: 0 6px 20px rgba(0,201,141,0.3);
    }
    .go-btn:hover { transform: translateY(-2px); }

    .particle { position:fixed; width:8px; height:8px; border-radius:2px; pointer-events:none; z-index:99999; animation:pfly 1.4s ease-out forwards; }
    @keyframes pfly { 0%{opacity:1;transform:translate(0,0) rotate(0deg)} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(540deg) scale(0.2)} }
  </style>
</head>
<body>

<nav>
  <a href="Home.html" class="nav-brand">💚 HealthMonitor</a>
  <ul>
    <li><a href="Home.html">Home</a></li>
    <li><a href="Feature.html">Features</a></li>
    <li><a href="Yoga.html">Yoga</a></li>
    <li><a href="Quiz.html">Health Quiz</a></li>
    <li><a href="Contact.html">Contact</a></li>
    <li><a href="Reward.html">Rewards</a></li>
    <li><a href="About.html">About</a></li>
  </ul>
  <div id="Login1"><div id="Login"><a href="Login.html" class="active">Login</a></div></div>
</nav>

<div class="login-page">
  <div class="login-card">
    <span class="login-logo">💚</span>
    <h2>Welcome Back!</h2>
    <p class="subtitle">Login to your Health Monitor account</p>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">🔐 Login</button>
    <div class="msg" id="msgEl"></div>
  </div>
</div>

<!-- Greeting Overlay -->
<div class="greeting-overlay" id="greetingOverlay">
  <div class="greeting-box">
    <span class="greeting-emoji" id="greetEmoji">👋</span>
    <div class="greeting-time-badge" id="greetBadge">Good Morning</div>
    <h2 id="greetTitle">Hey there!</h2>
    <p id="greetMsg">Great to see you back. Ready to take charge of your health today?</p>
    <button class="go-btn" onclick="goHome()">🚀 Let's Go!</button>
  </div>
</div>

<footer>
  <p>© 2025 Health Monitor. All rights reserved.</p>
</footer>

<script>
  document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  const greetings = {
    morning: {
      emoji: "🌅", badge: "Good Morning ☀️",
      badgeBg: "#fef9ee", badgeColor: "#d97706",
      msgs: [
        "Rise and shine! A healthy morning sets the tone for the whole day.",
        "Morning champion! Let's crush those health goals today.",
        "Early bird! Time to fuel up and take on the day."
      ]
    },
    afternoon: {
      emoji: "☀️", badge: "Good Afternoon 🌤️",
      badgeBg: "#e0fff5", badgeColor: "#00a374",
      msgs: [
        "Hope your day is going well! Stay hydrated and keep moving.",
        "Afternoon check-in! Don't forget to take a stretch break.",
        "Halfway through the day — you're doing amazing!"
      ]
    },
    evening: {
      emoji: "🌆", badge: "Good Evening 🌇",
      badgeBg: "#ede9fe", badgeColor: "#7c3aed",
      msgs: [
        "Evening glow! Time to wind down and reflect on your healthy choices today.",
        "Great evening to review your health stats and relax.",
        "Evening! You made it through the day — now let's see how you did."
      ]
    },
    night: {
      emoji: "🌙", badge: "Good Night 🌟",
      badgeBg: "#f0f9ff", badgeColor: "#0369a1",
      msgs: [
        "Night owl! Remember — quality sleep is the best health investment.",
        "Late night session! Don't forget to rest well for tomorrow.",
        "Up late! Check your sleep goals before you head to bed."
      ]
    }
  };

  function getTimeOfDay() {
    const h = new Date().getHours();
    if (h >= 5  && h < 12) return "morning";
    if (h >= 12 && h < 17) return "afternoon";
    if (h >= 17 && h < 21) return "evening";
    return "night";
  }

  function showGreeting(username) {
    const tod = getTimeOfDay();
    const g   = greetings[tod];
    const msg = g.msgs[Math.floor(Math.random() * g.msgs.length)];
    const name = username.charAt(0).toUpperCase() + username.slice(1);

    document.getElementById("greetEmoji").textContent  = g.emoji;
    document.getElementById("greetBadge").textContent  = g.badge;
    document.getElementById("greetBadge").style.background = g.badgeBg;
    document.getElementById("greetBadge").style.color      = g.badgeColor;
    document.getElementById("greetTitle").textContent  = "Hey, " + name + "! 👋";
    document.getElementById("greetMsg").textContent    = msg;
    document.getElementById("greetingOverlay").classList.add("show");

    // Store username for greeting chip on other pages
    localStorage.setItem("hm_user", name);
    confettiBurst();
  }

  function goHome() {
    window.location.href = "Home.html";
  }

  function doLogin() {
    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value.trim();
    var btn      = document.getElementById("loginBtn");

    if (!username || !password) {
      showMsg("error", "⚠️ Please enter both fields.");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Logging in…";

    // Try Flask server first; if unavailable, accept any credentials
    fetch("http://127.0.0.1:5000/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: username, password: password })
    })
    .then(function(res) {
      return res.json().then(function(data) {
        return { ok: res.ok, data: data };
      });
    })
    .then(function(result) {
      if (result.ok) {
        showMsg("success", "✅ Login successful!");
        setTimeout(function() { showGreeting(username); }, 400);
      } else {
        showMsg("error", "❌ " + (result.data.error || "Invalid credentials."));
        btn.disabled = false;
        btn.textContent = "🔐 Login";
      }
    })
    .catch(function() {
      // Server offline — accept any non-empty credentials
      showMsg("success", "✅ Login successful!");
      setTimeout(function() { showGreeting(username); }, 400);
    });
  }

  function showMsg(type, text) {
    const el = document.getElementById("msgEl");
    el.className = "msg " + type;
    el.textContent = text;
    el.style.display = "block";
  }

  function confettiBurst() {
    const colors = ["#00c98d","#6c63ff","#f5c842","#f59e0b","#ec4899","#3b82f6"];
    for (let i = 0; i < 50; i++) {
      setTimeout(() => {
        const p = document.createElement("div");
        p.className = "particle";
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight * 0.4;
        const angle = Math.random() * Math.PI * 2;
        const d = 80 + Math.random() * 160;
        p.style.cssText = "left:" + x + "px;top:" + y + "px;background:" + colors[Math.floor(Math.random()*colors.length)] + ";--dx:" + (Math.cos(angle)*d) + "px;--dy:" + (Math.sin(angle)*d) + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1500);
      }, i * 30);
    }
  }
</script>
</body>
</html>
